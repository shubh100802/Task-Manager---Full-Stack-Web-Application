<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Task Manager Architecture Quick View</title>
  <desc id="desc">Flow from React frontend to Express API to MongoDB with JWT authentication middleware.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="cardA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="cardB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="cardC" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#cbd5e1"/>
    </marker>
    <style>
      .title{font:700 34px 'Segoe UI',Arial,sans-serif;fill:#f8fafc}
      .sub{font:500 18px 'Segoe UI',Arial,sans-serif;fill:#94a3b8}
      .head{font:700 24px 'Segoe UI',Arial,sans-serif;fill:#eff6ff}
      .txt{font:500 16px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .mini{font:500 14px 'Segoe UI',Arial,sans-serif;fill:#dbeafe}
      .line{stroke:#cbd5e1;stroke-width:4;fill:none;marker-end:url(#arrow)}
      .pill{fill:#0b1220;stroke:#334155;stroke-width:1.5}
      .pilltext{font:600 13px 'Segoe UI',Arial,sans-serif;fill:#bfdbfe}
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="520" fill="url(#bg)"/>
  <text x="52" y="64" class="title">Architecture (Quick View)</text>
  <text x="52" y="94" class="sub">React Frontend -> Express API -> MongoDB</text>

  <rect x="55" y="140" rx="18" ry="18" width="320" height="290" fill="url(#cardA)"/>
  <text x="85" y="190" class="head">Frontend (React)</text>
  <text x="85" y="225" class="txt">• Pages: Login / Signup / Dashboard</text>
  <text x="85" y="253" class="txt">• Axios service for API calls</text>
  <text x="85" y="281" class="txt">• JWT stored in localStorage</text>
  <text x="85" y="309" class="txt">• Filters + Search + Analytics UI</text>

  <rect x="440" y="120" rx="18" ry="18" width="360" height="330" fill="url(#cardB)"/>
  <text x="470" y="170" class="head">Backend (Node + Express)</text>
  <text x="470" y="205" class="txt">• Routes: /api/auth, /api/tasks</text>
  <text x="470" y="233" class="txt">• Controllers: auth + task logic</text>
  <text x="470" y="261" class="txt">• Middleware: auth + global error handler</text>
  <text x="470" y="289" class="txt">• JWT verification on protected endpoints</text>

  <rect x="865" y="140" rx="18" ry="18" width="280" height="290" fill="url(#cardC)"/>
  <text x="895" y="190" class="head">Database (MongoDB)</text>
  <text x="895" y="225" class="txt">• Users collection</text>
  <text x="895" y="253" class="txt">• Tasks collection</text>
  <text x="895" y="281" class="txt">• Mongoose models + indexes</text>
  <text x="895" y="309" class="txt">• Query filters and analytics</text>

  <path class="line" d="M380 275 C410 275, 420 275, 435 275"/>
  <path class="line" d="M805 275 C830 275, 840 275, 860 275"/>

  <rect x="510" y="344" width="220" height="44" rx="22" class="pill"/>
  <text x="542" y="372" class="pilltext">JWT Auth + Protected APIs</text>

  <text x="52" y="478" class="mini">Client sends request with token -> API validates token -> DB operations -> response to UI</text>
</svg>
